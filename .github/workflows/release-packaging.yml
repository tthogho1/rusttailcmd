name: Release Packaging

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Build (release)
        run: cargo build --release

      - name: Zip macOS binary
        run: |
          mkdir -p dist
          cp target/release/wtail dist/wtail
          chmod +x dist/wtail
          cd dist && zip -r ../wtail-macos.zip wtail

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: wtail-macos
          path: wtail-macos.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Build (release)
        run: cargo build --release

      - name: Zip Windows binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -Path target\release\wtail.exe -Destination dist\wtail.exe -Force
          Compress-Archive -Path dist\wtail.exe -DestinationPath wtail-windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: wtail-windows
          path: wtail-windows.zip

  package:
    name: Package combined release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: wtail-macos
          path: artifacts/macos

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: wtail-windows
          path: artifacts/windows

      - name: Unpack and combine
        run: |
          mkdir -p combined
          unzip artifacts/macos/wtail-macos.zip -d combined || true
          unzip artifacts/windows/wtail-windows.zip -d combined || true
          cd combined
          zip -r ../wtail.zip .

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: wtail-combined
          path: wtail.zip

      - name: Create Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset (wtail.zip)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: wtail.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
